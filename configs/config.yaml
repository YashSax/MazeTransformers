entity: "whysax-agnetic-labs"
project: "MazeSFT"
name: "many_mazes_16"

model:
  name: "ex_2"
  vocab_size: 10
  output_vocab_size: 5
  d_model: 256
  n_layers: 10
  max_seq_len: 512
  n_heads: 4
  dropout: 0
  device: cuda

training:
  supervised:
    batch_size: 128
    num_epochs: 1
    learning_rate: 0.00005
    output_dir: supervised/
    device: mps
  grpo:
    batch_size: 8
    group_size: 8
    kl_penalty: 0.02
    eps: 0.01
    learning_rate: 0.00005
    num_epochs: 10
    baseline_update_frequency: 1
    output_dir: grpo/
    device: cuda


dataset:
  supervised:
    sixteen:
      size: 16
      num_train: 512
      num_test: 512
    output_dir: data
  grpo:
    four:
      size: 4
      num_train: 64
      num_test: 32
    output_dir: grpo_data
